version: '3.8'

services:
  chat-gui:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-http://127.0.0.1:18789}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_AGENT_ID=${OPENCLAW_AGENT_ID:-main}
      - OPENCLAW_MODEL=${OPENCLAW_MODEL:-openclaw:main}
      - OPENCLAW_USER=${OPENCLAW_USER:-chat-gui}
      - PORT=${PORT:-4000}
    volumes:
      - ./server/chat-history.json:/app/chat-history.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
